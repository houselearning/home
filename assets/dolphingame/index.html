<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dolphin Butter Splash</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-shell">
    <header class="top-bar">
      <div class="title">Dolphin Butter Splash</div>
      <div class="scoreboard">Points: <span id="score">0</span></div>
    </header>

    <main class="game-area">
      <canvas id="gameCanvas" width="900" height="600"></canvas>
      <div class="help-box">
        <p>Tap or click the arrows to move the dolphin.</p>
        <p>Eat the butter pieces to score points. Avoid the rocks!</p>
      </div>
    </main>

    <footer class="controls">
      <button id="leftBtn">◀</button>
      <button id="upBtn">▲</button>
      <button id="downBtn">▼</button>
      <button id="rightBtn">▶</button>
    </footer>
  </div>

  <script src="game.js"></script>
</body>
</html>
