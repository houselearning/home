<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>5th Grade Math: Order of Operations (PEMDAS)</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  
  <style>
    :root { 
      /* Energetic Teal/Cyan theme for Algorithmic Logic */
      --lab-primary: #00b894; 
      --lab-dark: #2d3436; 
      --bg: #dfe6e9; 
      --success: #00cec9; 
      --error: #d63031;
      --locked: #b2bec3; 
    }
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; color: var(--lab-dark); }
    
    /* Navigation Sidebar */
    nav { width: 340px; background: white; border-right: 1px solid #c8d6e5; display: flex; flex-direction: column; flex-shrink: 0; }
    .nav-header { padding: 25px; background: var(--lab-primary); color: white; }
    .nav-container { flex: 1; overflow-y: auto; }
    .nav-section-title { padding: 12px 20px; font-weight: bold; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; background: #f1f2f6; color: #636e72; }
    .nav-item { padding: 12px 20px; cursor: pointer; border-bottom: 1px solid #eee; color: #2d3436; font-size: 13px; position: relative; transition: 0.3s; display: flex; align-items: center; justify-content: space-between; }
    .nav-item.active { background: #e8f8f5; color: var(--lab-primary); font-weight: bold; border-left: 5px solid var(--lab-primary); }
    .nav-item.locked { color: var(--locked); cursor: not-allowed; background: #f9f9f9; }
    .nav-item.locked::after { content: '🔒'; font-size: 12px; }
    .nav-item.completed::after { content: '✅'; font-size: 12px; }
    
    /* Main Content Area */
    main { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; align-items: center; }
    .content-card { background: white; width: 100%; max-width: 850px; padding: 40px; border-radius: 15px; border: 1px solid #c8d6e5; opacity: 0; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .content-card.active { display: block; animation: fadeIn 0.4s forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    /* Reusable UI Elements */
    .btn { background: var(--lab-primary); color: white; border: none; padding: 14px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; box-shadow: 0 4px 0 #009473; transition: 0.2s; }
    .btn:hover { transform: translateY(-2px); }
    .btn:disabled { background: var(--locked); box-shadow: none; cursor: not-allowed; transform: none; }
    .btn.ans-btn { background: #ecf0f1; color: var(--lab-dark); margin: 0 10px; box-shadow: 0 4px 0 #b2bec3; }
    .btn.ans-btn:hover { background: #dfe6e9; }
    
    .math-box { font-size: 28px; display: flex; align-items: center; justify-content: center; background: #f8f9fa; padding: 25px; border-radius: 10px; border: 2px dashed #b2bec3; margin: 25px 0; }
    .math-input { width: 120px; padding: 10px; text-align: center; border: 2px solid var(--lab-primary); border-radius: 8px; font-size: 24px; font-weight: bold; color: var(--lab-dark); outline: none; }
    .math-input:focus { border-color: var(--success); box-shadow: 0 0 8px rgba(0,206,201,0.3); }
    
    .video-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; border-radius: 12px; overflow: hidden; background: #000; margin-bottom: 20px; }
    .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    
    .feedback-text { font-size: 18px; font-weight: bold; text-align: center; margin-top: 15px; height: 30px; }

    /* Custom Simulator UI */
    .sim-step { display: flex; justify-content: space-between; align-items: center; background: #f1f2f6; padding: 15px 25px; margin-bottom: 10px; border-radius: 8px; font-size: 18px; border-left: 4px solid var(--lab-dark); }
    .sim-input { width: 80px; padding: 8px; font-size: 18px; text-align: center; border: 2px solid #b2bec3; border-radius: 6px; }
  </style>
</head>
<body>

<nav>
  <div class="nav-header">
    <strong style="font-size: 18px;">🔢 PEMDAS Logic Lab</strong>
    <div id="percent-display" style="font-size: 13px; margin-top:8px; opacity:0.8;">Syncing Algorithms...</div>
  </div>
  <div class="nav-container" id="nav-list"></div>
</nav>

<main>
  <div id="dynamic-content" class="content-card"></div>
</main>

<script>
  // ---------------------------------------------------------
  // 1. DATA CONFIGURATION & LESSON GENERATORS
  // ---------------------------------------------------------
  function makeInfo(title, text, btnText = "Acknowledge Directive") {
    return `<h1>${title}</h1><p style="font-size:18px; line-height:1.6;">${text}</p><br><div style="text-align:center;"><button class="btn" onclick="submitSimple()">${btnText}</button></div>`;
  }

  function makeInput(title, concept, q, ans) {
    return `<h1>${title}</h1><p style="font-size:16px; color:#636e72;">${concept}</p>
            <div class="math-box"><span>${q}</span>
            <input type="number" step="any" id="ans-input" class="math-input" placeholder="?">
            <button class="btn" style="margin-left:20px;" onclick="submitInput(${ans})">Verify</button></div>
            <div id="fb-box" class="feedback-text"></div>`;
  }

  function makeMCQ(title, concept, q, trueTxt, falseTxt, isTrueFirst) {
    const correctMsg = "Correct! Logic protocol verified.";
    const errorMsg = "Sequence error. Re-evaluate order.";
    const btn1 = isTrueFirst 
      ? `<button class="btn ans-btn" onclick="submitMCQ(true, '${correctMsg}')">${trueTxt}</button>` 
      : `<button class="btn ans-btn" onclick="submitMCQ(false, '${errorMsg}')">${trueTxt}</button>`;
    const btn2 = isTrueFirst 
      ? `<button class="btn ans-btn" onclick="submitMCQ(false, '${errorMsg}')">${falseTxt}</button>` 
      : `<button class="btn ans-btn" onclick="submitMCQ(true, '${correctMsg}')">${falseTxt}</button>`;
    return `<h1>${title}</h1><p style="font-size:16px; color:#636e72;">${concept}</p>
            <div class="math-box" style="font-size:22px; text-align:center;">${q}</div>
            <div style="text-align:center; margin-top:20px;">${btn1}${btn2}</div>
            <div id="fb-box" class="feedback-text"></div>`;
  }

  const lessonData = [
    // --- CORE PROTOCOLS ---
    {
      title: "1. 🎬 Briefing: The Universal Code", section: "Core Protocols",
      html: `<h1>Briefing: The Order of Operations</h1>
             <p>Welcome, Logician. In mathematics, if two people solve the exact same problem, they MUST get the same answer. To guarantee this, the world uses a master sequence called <strong>PEMDAS</strong> to decide which part of a math problem to solve first.</p>
             <div class="video-container"><iframe src="https://www.youtube.com/embed/dAgfnK528RA" frameborder="0" allowfullscreen></iframe></div>
             <div style="text-align:center;"><button class="btn" onclick="submitSimple()">Initialize Logic Engine</button></div>`
    },
    {
      title: "2. 🔍 The Sequence Need", section: "Core Protocols",
      html: makeMCQ("Why do we need an Order?", "Without an agreed-upon order of operations, what happens to the problem: <strong>3 + 2 &times; 4</strong> ?", "People might get different answers (20 vs 11).", "The math is impossible to solve.", true)
    },
    
    // --- LEVEL 1: P & E ---
    {
      title: "3. 📜 Level 1: P and E", section: "Level 1: P & E",
      html: makeInfo("Parentheses & Exponents", "<strong>P</strong> stands for <strong>Parentheses ( )</strong>. Any math inside parentheses is VIP and gets done FIRST. <br><br><strong>E</strong> stands for <strong>Exponents (Powers)</strong> like 3<sup>2</sup>. They are next in line.")
    },
    {
      title: "4. ⚡ Parentheses Protocol", section: "Level 1: P & E",
      html: makeInput("Parentheses Protocol", "Solve the parentheses first, then multiply. <br>Equation: <strong>(3 + 5) &times; 2</strong>", "Result = ", 16)
    },
    {
      title: "5. ⚡ Exponent Enforcement", section: "Level 1: P & E",
      html: makeInput("Exponent Enforcement", "Solve the exponent first, then add. <br>Equation: <strong>4<sup>2</sup> + 10</strong> <span style='font-size:14px; color:#636e72;'>(Hint: 4&times;4 + 10)</span>", "Result = ", 26)
    },

    // --- LEVEL 2: M & D (The Trap) ---
    {
      title: "6. 📜 Level 2: M and D", section: "Level 2: M & D",
      html: makeInfo("Multiplication & Division", "<strong>M</strong> and <strong>D</strong> stand for Multiplication and Division. <br><br>🚨 <strong>CRITICAL RULE:</strong> They are a TIE in priority! You do not always multiply first. You must solve them <strong>Left to Right</strong>, just like reading a book.")
    },
    {
      title: "7. 🔍 The Left-to-Right Trap", section: "Level 2: M & D",
      html: makeMCQ("The Left-to-Right Trap", "Equation: <strong>16 &divide; 2 &times; 4</strong><br>Since M and D are a tie, we read left to right. What is the correct answer?", "32", "2", true)
    },
    {
      title: "8. ⚡ M & D Application", section: "Level 2: M & D",
      html: makeInput("M & D Application", "Equation: <strong>20 &divide; 5 &times; 3</strong>", "Result = ", 12)
    },

    // --- LEVEL 3: A & S ---
    {
      title: "9. 📜 Level 3: A and S", section: "Level 3: A & S",
      html: makeInfo("Addition & Subtraction", "<strong>A</strong> and <strong>S</strong> stand for Addition and Subtraction. <br><br>Just like M and D, they are a <strong>TIE</strong>. You must solve whatever comes first from <strong>Left to Right</strong>.")
    },
    {
      title: "10. ⚡ A & S Application", section: "Level 3: A & S",
      html: makeInput("A & S Application", "Equation: <strong>15 - 5 + 4</strong><br><span style='font-size:14px; color:#636e72;'>Solve left to right!</span>", "Result = ", 14)
    },

    // --- LEVEL 4: SIMULATOR ---
    {
      title: "11. ⚙️ ALGORITHM SIMULATOR", section: "Level 4: Simulator",
      html: `<h1>Algorithmic Decoupler</h1>
             <p style="color:#636e72;">To master complex equations, we break them down step-by-step. Follow the PEMDAS protocol to dismantle this master equation.</p>
             
             <div style="background:#2d3436; color:white; padding:20px; border-radius:10px; text-align:center; margin-bottom:20px; font-size:24px; font-weight:bold; letter-spacing:2px;">
                 10 + 2 &times; (8 - 5)<sup>2</sup>
             </div>

             <div style="display:flex; flex-direction:column; gap:10px; margin-bottom:20px;">
                <div class="sim-step" style="border-color: #e84393;">
                   <span><strong>Step 1: ( P )</strong> &nbsp; Evaluate (8 - 5)</span>
                   <input type="number" id="sim-1" class="sim-input" placeholder="?">
                </div>
                <div class="sim-step" style="border-color: #0984e3;">
                   <span><strong>Step 2: ( E )</strong> &nbsp; Evaluate Answer<sup>2</sup></span>
                   <input type="number" id="sim-2" class="sim-input" placeholder="?">
                </div>
                <div class="sim-step" style="border-color: #00b894;">
                   <span><strong>Step 3: ( M )</strong> &nbsp; Evaluate 2 &times; Answer</span>
                   <input type="number" id="sim-3" class="sim-input" placeholder="?">
                </div>
                <div class="sim-step" style="border-color: #fdcb6e;">
                   <span><strong>Step 4: ( A )</strong> &nbsp; Evaluate 10 + Answer</span>
                   <input type="number" id="sim-4" class="sim-input" placeholder="?">
                </div>
             </div>

             <div style="text-align:center;">
                <button class="btn" onclick="submitSim()">Verify Sequence</button>
             </div>
             <div id="fb-box" class="feedback-text"></div>`
    },

    // --- LEVEL 5: Advanced Engineering ---
    {
      title: "12. ⚡ The Full Protocol 1", section: "Level 5: Advanced Logic",
      html: makeInput("The Full Protocol", "Equation: <strong>3 &times; (4 + 2) - 10</strong>", "Result = ", 8)
    },
    {
      title: "13. ⚡ The Full Protocol 2", section: "Level 5: Advanced Logic",
      html: makeInput("Division Priority", "Equation: <strong>20 - 10 &divide; 2 + 3</strong>", "Result = ", 18)
    },
    {
      title: "14. 📝 Terminal Diagnostics", section: "Level 5: Advanced Logic",
      html: `<h1>Final Diagnostics Output</h1>
             <p>Verify all logic sequences to unlock the Mastery Badge.</p>
             <div style="background:#f8f9fa; padding:20px; border-radius:10px; border:2px dashed #b2bec3; margin:20px 0;">
               <p style="margin:0 0 10px 0; font-size:20px;"><strong>1. Evaluate: (12 &divide; 3) + 2<sup>3</sup></strong></p>
               <input type="number" id="final-q1" class="math-input" placeholder="Ans = ?">
               
               <p style="margin:20px 0 10px 0; font-size:20px;"><strong>2. Evaluate: 24 - 4 &times; 3 + 2</strong></p>
               <input type="number" id="final-q2" class="math-input" placeholder="Ans = ?">
             </div>
             <div style="text-align:center;"><button class="btn" onclick="submitFinal(12, 14)">Submit Log</button></div>
             <div id="fb-box" class="feedback-text"></div>`
    },
    {
      title: "15. 🏆 Graduation", section: "Level 5: Advanced Logic",
      html: `<div style="text-align: center; padding-top:40px;">
               <h1 style="font-size: 80px; margin-bottom: 0;">🏆</h1>
               <h1>Logic Protocol Verified!</h1>
               <p style="font-size:18px; max-width:500px; margin: 0 auto 30px auto;">You have successfully mastered PEMDAS, navigating parentheses, exponents, and the tricky left-to-right rules of operations.</p>
               <button id="mastery-btn" class="btn" style="background:var(--success); box-shadow:none;" onclick="this.innerText='Logs Saved!'; this.disabled=true;">Session Complete</button>
             </div>`
    }
  ];

  // ---------------------------------------------------------
  // 2. FIREBASE & STATE MANAGEMENT
  // ---------------------------------------------------------
  const lessonID = "5th_grade_pemdas_v1";
  
  // Dummy Firebase Config based on standard template
  const firebaseConfig = {
    apiKey: "AIzaSyDoXSwni65CuY1_32ZE8B1nwfQO_3VNpTw",
    authDomain: "contract-center-llc-10.firebaseapp.com",
    projectId: "contract-center-llc-10",
    storageBucket: "contract-center-llc-10.firebasestorage.app",
    messagingSenderId: "323221512767",
    appId: "1:323221512767:web:6421260f875997dbf64e8a"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  let currentUser = null;
  let stepsCompleted = {};
  let currentStep = 0;

  auth.onAuthStateChanged(user => { 
    if (user) { currentUser = user; syncProgress(); } 
  });

  async function syncProgress() {
    const docRef = db.collection('UserLessonProgress').doc(currentUser.uid).collection('lessons').doc(lessonID);
    const doc = await docRef.get();
    if(!doc.exists) {
      stepsCompleted = {};
      for(let i=0; i<lessonData.length; i++) stepsCompleted[`step_${i}`] = false;
    } else {
      stepsCompleted = doc.data().steps;
    }
    initSidebar();
    updateSidebar();
    showPage(0, true);
  }

  async function saveStepProgress(stepIdx, nextIdx) {
    stepsCompleted[`step_${stepIdx}`] = true;
    const docRef = db.collection('UserLessonProgress').doc(currentUser.uid).collection('lessons').doc(lessonID);
    await docRef.set({ steps: stepsCompleted, lastUpdated: new Date() }, { merge: true });
    updateSidebar();
    if(stepIdx !== nextIdx && nextIdx < lessonData.length) showPage(nextIdx);
  }

  // ---------------------------------------------------------
  // 3. UI RENDERING & VALIDATION
  // ---------------------------------------------------------
  function initSidebar() {
    const navList = document.getElementById('nav-list');
    let currentSection = "";
    let html = "";
    lessonData.forEach((lesson, i) => {
      if(lesson.section !== currentSection) {
         currentSection = lesson.section;
         html += `<div class="nav-section-title">${currentSection}</div>`;
      }
      html += `<div id="nav-item-${i}" class="nav-item" onclick="showPage(${i})">${lesson.title}</div>`;
    });
    navList.innerHTML = html;
  }

  function updateSidebar() {
    let completedCount = 0;
    lessonData.forEach((lesson, i) => {
      const el = document.getElementById(`nav-item-${i}`);
      if(!el) return;
      
      const isDone = stepsCompleted[`step_${i}`];
      const isPrevDone = i === 0 || stepsCompleted[`step_${i-1}`];
      
      if(isDone) completedCount++;
      
      el.className = "nav-item";
      if(i === currentStep) el.classList.add("active");
      else if(isDone) el.classList.add("completed");
      else if(!isPrevDone) el.classList.add("locked");
    });
    
    const maxSteps = lessonData.length - 1; 
    const pct = Math.round((completedCount / maxSteps) * 100);
    document.getElementById('percent-display').textContent = `System Optimization: ${pct > 100 ? 100 : pct}%`;
  }

  function showPage(index, force = false) {
    if (!force && index > 0 && !stepsCompleted[`step_${index-1}`]) return;
    
    currentStep = index;
    const contentBox = document.getElementById('dynamic-content');
    
    contentBox.classList.remove('active');
    contentBox.innerHTML = lessonData[index].html;
    void contentBox.offsetWidth; 
    contentBox.classList.add('active');
    
    updateSidebar();
  }

  // Submission Handlers
  function submitSimple() { saveStepProgress(currentStep, currentStep + 1); }

  function submitMCQ(isCorrect, msg) {
    const fb = document.getElementById('fb-box');
    if(isCorrect) {
       fb.innerHTML = `<span style="color:var(--success);">${msg}</span>`;
       setTimeout(() => saveStepProgress(currentStep, currentStep + 1), 1000);
    } else {
       fb.innerHTML = `<span style="color:var(--error);">${msg}</span>`;
    }
  }

  function submitInput(expectedValue) {
    const val = document.getElementById('ans-input').value.trim();
    const fb = document.getElementById('fb-box');
    if(val !== "" && Number(val) === expectedValue) {
       fb.innerHTML = `<span style="color:var(--success);">✅ Verified! Matrix locked.</span>`;
       setTimeout(() => saveStepProgress(currentStep, currentStep + 1), 1000);
    } else {
       fb.innerHTML = `<span style="color:var(--error);">❌ System Alert: Check your calculations.</span>`;
    }
  }

  function submitFinal(exp1, exp2) {
    const q1 = document.getElementById('final-q1').value.trim();
    const q2 = document.getElementById('final-q2').value.trim();
    const fb = document.getElementById('fb-box');
    if(q1 !== "" && q2 !== "" && Number(q1) === exp1 && Number(q2) === exp2) {
       fb.innerHTML = `<span style="color:var(--success);">✅ Terminal checks passed! Core unlocked.</span>`;
       setTimeout(() => saveStepProgress(currentStep, currentStep + 1), 1200);
    } else {
       fb.innerHTML = `<span style="color:var(--error);">❌ Diagnostics failed. Recheck the PEMDAS rules.</span>`;
    }
  }

  // ---------------------------------------------------------
  // 4. SIMULATOR LOGIC (L4)
  // ---------------------------------------------------------
  function submitSim() {
    const v1 = parseInt(document.getElementById('sim-1').value);
    const v2 = parseInt(document.getElementById('sim-2').value);
    const v3 = parseInt(document.getElementById('sim-3').value);
    const v4 = parseInt(document.getElementById('sim-4').value);
    
    const fb = document.getElementById('fb-box');
    
    // Expected sequence for 10 + 2 * (8 - 5)^2
    // 1: (8-5) = 3
    // 2: 3^2 = 9
    // 3: 2*9 = 18
    // 4: 10+18 = 28
    
    if (v1 === 3 && v2 === 9 && v3 === 18 && v4 === 28) {
       fb.innerHTML = `<span style="color:var(--success);">✅ Perfect Decoupling! Sequence Verified.</span>`;
       setTimeout(() => saveStepProgress(currentStep, currentStep + 1), 1500);
    } else {
       let err = "❌ Incorrect sequence.<br>";
       if (v1 !== 3) err += "Step 1 is wrong (8-5). ";
       else if (v2 !== 9) err += "Step 2 is wrong (Square the answer from Step 1). ";
       else if (v3 !== 18) err += "Step 3 is wrong (Multiply by 2). ";
       else if (v4 !== 28) err += "Step 4 is wrong (Add 10). ";
       
       fb.innerHTML = `<span style="color:var(--error); font-size: 15px;">${err}</span>`;
    }
  }
</script>
</body>
</html>
