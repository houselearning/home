<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>5th Grade Math: Order of Operations (PEMDAS)</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>

  <style>
    :root { 
      /* Energetic Teal/Cyan theme for Algorithmic Logic */
      --lab-primary: #00b894; 
      --lab-dark: #2d3436; 
      --bg: #dfe6e9; 
      --success: #00cec9; 
      --error: #d63031;
      --locked: #b2bec3; 
    }
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; color: var(--lab-dark); }
    
    /* Navigation Sidebar */
    nav { width: 340px; background: white; border-right: 1px solid #c8d6e5; display: flex; flex-direction: column; flex-shrink: 0; }
    .nav-header { padding: 25px; background: var(--lab-primary); color: white; }
    .nav-container { flex: 1; overflow-y: auto; }
    .nav-section-title { padding: 12px 20px; font-weight: bold; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; background: #f1f2f6; color: #636e72; }
    .nav-item { padding: 12px 20px; cursor: pointer; border-bottom: 1px solid #eee; color: #2d3436; font-size: 13px; position: relative; transition: 0.3s; display: flex; align-items: center; justify-content: space-between; }
    .nav-item.active { background: #e8f8f5; color: var(--lab-primary); font-weight: bold; border-left: 5px solid var(--lab-primary); }
    .nav-item.locked { color: var(--locked); cursor: not-allowed; background: #f9f9f9; }
    .nav-item.locked::after { content: '🔒'; font-size: 12px; }
    .nav-item.completed::after { content: '✅'; font-size: 12px; }
    
    /* Main Content Area */
    main { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; align-items: center; }
    .content-card { background: white; width: 100%; max-width: 850px; padding: 40px; border-radius: 15px; border: 1px solid #c8d6e5; opacity: 0; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .content-card.active { display: block; animation: fadeIn 0.4s forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    /* Reusable UI Elements */
    .btn { background: var(--lab-primary); color: white; border: none; padding: 14px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; box-shadow: 0 4px 0 #009473; transition: 0.2s; }
    .btn:hover { transform: translateY(-2px); }
    .btn:disabled { background: var(--locked); box-shadow: none; cursor: not-allowed; transform: none; }
    .btn.ans-btn { background: #ecf0f1; color: var(--lab-dark); margin: 0 10px; box-shadow: 0 4px 0 #b2bec3; }
    .btn.ans-btn:hover { background: #dfe6e9; }
    
    .math-box { font-size: 28px; display: flex; align-items: center; justify-content: center; background: #f8f9fa; padding: 25px; border-radius: 10px; border: 2px dashed #b2bec3; margin: 25px 0; }
    .math-input { width: 120px; padding: 10px; text-align: center; border: 2px solid var(--lab-primary); border-radius: 8px; font-size: 24px; font-weight: bold; color: var(--lab-dark); outline: none; }
    .math-input:focus { border-color: var(--success); box-shadow: 0 0 8px rgba(0,206,201,0.3); }
    
    .video-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; border-radius: 12px; overflow: hidden; background: #000; margin-bottom: 20px; }
    .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    
    .feedback-text { font-size: 18px; font-weight: bold; text-align: center; margin-top: 15px; height: 30px; }

    /* Custom Simulator UI */
    .sim-step { display: flex; justify-content: space-between; align-items: center; background: #f1f2f6; padding: 15px 25px; margin-bottom: 10px; border-radius: 8px; font-size: 18px; border-left: 4px solid var(--lab-dark); }
    .sim-input { width: 80px; padding: 8px; font-size: 18px; text-align: center; border: 2px solid #b2bec3; border-radius: 6px; }
  </style>
</head>

<nav>
  <div class="nav-header">
    <strong style="font-size: 18px;">🔢 PEMDAS Logic Lab</strong>
    <div id="percent-display" style="font-size: 13px; margin-top:8px; opacity:0.8;">Syncing Algorithms...</div>
  </div>
  <div class="nav-container" id="nav-list"></div>
</nav>

<main>
  <div id="dynamic-content" class="content-card"></div>
</main>

  // ---------------------------------------------------------
  // 1. DATA CONFIGURATION & LESSON GENERATORS

  function makeInfo(title, text, btnText = "Acknowledge Directive") {
    return `<h1>${title}</h1><p style="font-size:18px; line-height:1.6;">${text}</p><br><div style="text-align:center;"><button class="btn" onclick="submitSimple()">${btnText}</button></div>`;
  }

  function makeInput(title, concept, q, ans) {
    return `<h1>${title}</h1><p style="font-size:16px; color:#636e72;">${concept}</p>
            <div class="math-box"><span>${q}</span>
            <input type="number" step="any" id="ans-input" class="math-input" placeholder="?">
            <button class="btn" style="margin-left:20px;" onclick="submitInput(${ans})">Verify</button></div>
            <div id="fb-box" class="feedback-text"></div>`;
  }

  function makeMCQ(title, concept, q, trueTxt, falseTxt, isTrueFirst) {
    const correctMsg = "Correct! Logic protocol verified.";
    const errorMsg = "Sequence error. Re-evaluate order.";
    const btn1 = isTrueFirst 
      ? `<button class="btn ans-btn" onclick="submitMCQ(true, '${correctMsg}')">${trueTxt}</button>` 
      : `<button class="btn ans-btn" onclick="submitMCQ(false, '${errorMsg}')">${trueTxt}</button>`;
    const btn2 = isTrueFirst 
      ? `<button class="btn ans-btn" onclick="submitMCQ(false, '${errorMsg}')">${falseTxt}</button>` 
      : `<button class="btn ans-btn" onclick="submitMCQ(true, '${correctMsg}')">${falseTxt}</button>`;
    return `<h1>${title}</h1><p style="font-size:16px; color:#636e72;">${concept}</p>
            <div class="math-box" style="font-size:22px; text-align:center;">${q}</div>
            <div style="text-align:center; margin-top:20px;">${btn1}${btn2}</div>
            <div id="fb-box" class="feedback-text"></div>`;
  }
