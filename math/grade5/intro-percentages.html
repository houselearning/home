<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>5th Grade Math: Intro to Percentages</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  
  <style>
    :root { 
      /* Financial Gold / Data Theme for Percentages */
      --lab-primary: #e67e22; 
      --lab-dark: #2c3e50; 
      --bg: #fdfefe; 
      --success: #27ae60; 
      --error: #c0392b;
      --locked: #bdc3c7; 
    }
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; color: var(--lab-dark); }
    
    /* Navigation Sidebar */
    nav { width: 340px; background: white; border-right: 1px solid #dfe6e9; display: flex; flex-direction: column; flex-shrink: 0; }
    .nav-header { padding: 25px; background: var(--lab-primary); color: white; }
    .nav-container { flex: 1; overflow-y: auto; }
    .nav-section-title { padding: 12px 20px; font-weight: bold; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; background: #f1f2f6; color: #7f8c8d; }
    .nav-item { padding: 12px 20px; cursor: pointer; border-bottom: 1px solid #eee; color: #34495e; font-size: 13px; position: relative; transition: 0.3s; display: flex; align-items: center; justify-content: space-between; }
    .nav-item.active { background: #fcf3eb; color: var(--lab-primary); font-weight: bold; border-left: 5px solid var(--lab-primary); }
    .nav-item.locked { color: var(--locked); cursor: not-allowed; background: #f9f9f9; }
    .nav-item.locked::after { content: '🔒'; font-size: 12px; }
    .nav-item.completed::after { content: '✅'; font-size: 12px; }
    
    /* Main Content Area */
    main { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; align-items: center; }
    .content-card { background: white; width: 100%; max-width: 850px; padding: 40px; border-radius: 15px; border: 1px solid #dfe6e9; opacity: 0; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .content-card.active { display: block; animation: fadeIn 0.4s forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    /* Reusable UI Elements */
    .btn { background: var(--lab-primary); color: white; border: none; padding: 14px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; box-shadow: 0 4px 0 #d35400; transition: 0.2s; }
    .btn:hover { transform: translateY(-2px); }
    .btn:disabled { background: var(--locked); box-shadow: none; cursor: not-allowed; transform: none; }
    .btn.ans-btn { background: #ecf0f1; color: var(--lab-dark); margin: 0 10px; box-shadow: 0 4px 0 #bdc3c7; }
    .btn.ans-btn:hover { background: #bdc3c7; }
    
    .math-box { font-size: 28px; display: flex; align-items: center; justify-content: center; background: #f8f9fa; padding: 25px; border-radius: 10px; border: 2px dashed #bdc3c7; margin: 25px 0; }
    .math-input { width: 120px; padding: 10px; text-align: center; border: 2px solid var(--lab-primary); border-radius: 8px; font-size: 24px; font-weight: bold; color: var(--lab-dark); outline: none; }
    .math-input:focus { border-color: var(--success); box-shadow: 0 0 8px rgba(39,174,96,0.3); }
    
    .video-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; border-radius: 12px; overflow: hidden; background: #000; margin-bottom: 20px; }
    .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    
    .feedback-text { font-size: 18px; font-weight: bold; text-align: center; margin-top: 15px; height: 30px; }

    /* Custom Simulator Slider */
    input[type=range] { -webkit-appearance: none; width: 300px; background: transparent; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background: var(--lab-primary); cursor: pointer; margin-top: -8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; cursor: pointer; background: #dfe6e9; border-radius: 4px; }
  </style>
</head>
<body>

<nav>
  <div class="nav-header">
    <strong style="font-size: 18px;">% Percentage Lab</strong>
    <div id="percent-display" style="font-size: 13px; margin-top:8px; opacity:0.8;">Loading Ratios...</div>
  </div>
  <div class="nav-container" id="nav-list"></div>
</nav>

<main>
  <div id="dynamic-content" class="content-card"></div>
</main>

<script>
  // ---------------------------------------------------------
  // 1. DATA CONFIGURATION & LESSON GENERATORS
  // ---------------------------------------------------------
  function makeInfo(title, text, btnText = "Acknowledge Directive") {
    return `<h1>${title}</h1><p style="font-size:18px; line-height:1.6;">${text}</p><br><div style="text-align:center;"><button class="btn" onclick="submitSimple()">${btnText}</button></div>`;
  }

  function makeInput(title, concept, q, ans) {
    return `<h1>${title}</h1><p style="font-size:16px; color:#7f8c8d;">${concept}</p>
            <div class="math-box"><span>${q}</span>
            <input type="number" step="any" id="ans-input" class="math-input" placeholder="?">
            <button class="btn" style="margin-left:20px;" onclick="submitInput(${ans})">Verify</button></div>
            <div id="fb-box" class="feedback-text"></div>`;
  }

  function makeMCQ(title, concept, q, trueTxt, falseTxt, isTrueFirst) {
    const correctMsg = "Correct! Logic verified.";
    const errorMsg = "Incorrect. Recalculate your logic.";
    const btn1 = isTrueFirst 
      ? `<button class="btn ans-btn" onclick="submitMCQ(true, '${correctMsg}')">${trueTxt}</button>` 
      : `<button class="btn ans-btn" onclick="submitMCQ(false, '${errorMsg}')">${trueTxt}</button>`;
    const btn2 = isTrueFirst 
      ? `<button class="btn ans-btn" onclick="submitMCQ(false, '${errorMsg}')">${falseTxt}</button>` 
      : `<button class="btn ans-btn" onclick="submitMCQ(true, '${correctMsg}')">${falseTxt}</button>`;
    return `<h1>${title}</h1><p style="font-size:16px; color:#7f8c8d;">${concept}</p>
            <div class="math-box" style="font-size:22px; text-align:center;">${q}</div>
            <div style="text-align:center; margin-top:20px;">${btn1}${btn2}</div>
            <div id="fb-box" class="feedback-text"></div>`;
  }

  const lessonData = [
    // --- CORE PROTOCOLS ---
    {
      title: "1. 🎬 Briefing: Out of 100", section: "Core Protocols",
      html: `<h1>Briefing: The Meaning of Percent</h1>
             <p>Welcome to the Data Center. Have you ever wondered what a <em>percentage</em> actually is? The word breaks down into two parts: <strong>Per</strong> (for every) and <strong>Cent</strong> (one hundred). So, 50% simply means "50 out of every 100".</p>
             <div class="video-container"><iframe src="https://www.youtube.com/embed/JeVSmq1Nrpw" frameborder="0" allowfullscreen></iframe></div>
             <div style="text-align:center;"><button class="btn" onclick="submitSimple()">Initialize Data Engine</button></div>`
    },
    {
      title: "2. 🔍 The 'Cent' Rule", section: "Core Protocols",
      html: makeMCQ("The Root Word", "Think about the word <em>Cent</em>. A Century is 100 years. A Centipede has 100 legs. There are 100 Cents in a dollar. Therefore, a percent is ALWAYS a fraction out of...", "100", "10", true)
    },
    
    // --- LEVEL 1: Fractions to Percents ---
    {
      title: "3. 📜 The Fraction Connection", section: "Level 1: Fractions",
      html: makeInfo("The Fraction Connection", "Since a percent is always out of 100, translating fractions with a denominator of 100 is incredibly easy. <br><br>For example, <strong>35 / 100</strong> is exactly the same as <strong>35%</strong>.")
    },
    {
      title: "4. ⚡ Fraction Translation", section: "Level 1: Fractions",
      html: makeInput("Direct Translation", "Translate this fraction into a percentage.", "82 / 100 &nbsp;=&nbsp; ", 82)
    },
    {
      title: "5. 🔍 Scaling Up", section: "Level 1: Fractions",
      html: makeMCQ("Scaling Up", "What if your fraction is <strong>1 / 2</strong>? How do you turn that into a percent?", "Multiply the top and bottom by 50 to make it 50/100 (50%).", "Just put a % sign after the 1 (1%).", true)
    },

    // --- LEVEL 2: Decimals to Percents ---
    {
      title: "6. 📜 The Decimal Connection", section: "Level 2: Decimals",
      html: makeInfo("The Decimal Connection", "Decimals are also just fractions! Remember place value? <strong>0.45</strong> is read as 'forty-five hundredths' (45/100). <br><br>To turn a decimal into a percent, just <strong>move the decimal point two spots to the right</strong>.")
    },
    {
      title: "7. ⚡ Decimal Shift", section: "Level 2: Decimals",
      html: makeInput("Decimal Shift", "Move the decimal two places to the right to find the percent.", "0.78 &nbsp;=&nbsp; ", 78)
    },
    {
      title: "8. ⚡ The Sneaky Zero", section: "Level 2: Decimals",
      html: makeInput("The Sneaky Zero", "Be careful! 0.05 is 'five hundredths'. Move the decimal two places to the right.", "0.05 &nbsp;=&nbsp; ", 5)
    },

    // --- LEVEL 3: SIMULATOR ---
    {
      title: "9. ⚙️ 100-GRID SIMULATOR", section: "Level 3: Simulator",
      html: `<h1>100-Block Visualization Array</h1>
             <p style="color:#7f8c8d;">A percent represents a portion of 100 total blocks. Slide the bar to see how percentages fill the grid.</p>
             
             <div style="background:#f8f9fa; border-radius:12px; padding:20px; text-align:center;">
               <div style="display:flex; justify-content:center; align-items:center; gap:20px; margin-bottom:15px;">
                 <input type="range" id="sim-slider" min="0" max="100" value="50" oninput="updatePercentSim(this.value)">
                 <span id="sim-val" style="font-size:32px; font-weight:bold; color:var(--lab-primary); width: 80px;">50%</span>
               </div>
               <div id="percent-grid" style="display:grid; grid-template-columns:repeat(10,25px); grid-template-rows:repeat(10,25px); gap:2px; margin:0 auto; width:max-content;"></div>
             </div>

             <div class="math-box" style="margin-top:20px;">
                <span style="font-size:18px;">Set the grid to represent the decimal <strong>0.62</strong>.<br>How many blocks are left <strong>EMPTY</strong>?</span>
                <input type="number" id="ans-sim" class="math-input" placeholder="?" style="margin-left:20px;">
                <button class="btn" style="margin-left:20px;" onclick="submitSim()">Verify Data</button>
             </div>
             <div id="fb-box" class="feedback-text"></div>`
    },

    // --- LEVEL 4: Advanced Logic ---
    {
      title: "10. 📝 Terminal Diagnostics", section: "Level 4: Advanced Diagnostics",
      html: `<h1>Final Diagnostics Output</h1>
             <p>Verify all conversion protocols to unlock the Mastery Badge.</p>
             <div style="background:#f8f9fa; padding:20px; border-radius:10px; border:2px dashed #bdc3c7; margin:20px 0;">
               <p style="margin:0 0 10px 0; font-size:18px;"><strong>1. Convert the fraction 1/4 into a percentage.</strong></p>
               <input type="number" id="final-q1" class="math-input" placeholder="%">
               
               <p style="margin:20px 0 10px 0; font-size:18px;"><strong>2. If a battery is 12% full, what percentage is empty? (Hint: Total is 100)</strong></p>
               <input type="number" id="final-q2" class="math-input" placeholder="%">
             </div>
             <div style="text-align:center;"><button class="btn" onclick="submitFinal(25, 88)">Submit Log</button></div>
             <div id="fb-box" class="feedback-text"></div>`
    },
    {
      title: "11. 🏆 Graduation", section: "Level 4: Advanced Diagnostics",
      html: `<div style="text-align: center; padding-top:40px;">
               <h1 style="font-size: 80px; margin-bottom: 0;">🏆</h1>
               <h1>Ratio Protocol Verified!</h1>
               <p style="font-size:18px; max-width:500px; margin: 0 auto 30px auto;">You have successfully mastered Percentages, proving your ability to convert fractions and decimals into numbers out of 100.</p>
               <button id="mastery-btn" class="btn" style="background:#27ae60; box-shadow:none;" onclick="this.innerText='Logs Saved!'; this.disabled=true;">Session Complete</button>
             </div>`
    }
  ];

  // ---------------------------------------------------------
  // 2. FIREBASE & STATE MANAGEMENT
  // ---------------------------------------------------------
  const lessonID = "5th_grade_percentages_v1";
  
  const firebaseConfig = {
    apiKey: "AIzaSyDoXSwni65CuY1_32ZE8B1nwfQO_3VNpTw",
    authDomain: "contract-center-llc-10.firebaseapp.com",
    projectId: "contract-center-llc-10",
    storageBucket: "contract-center-llc-10.firebasestorage.app",
    messagingSenderId: "323221512767",
    appId: "1:323221512767:web:6421260f875997dbf64e8a"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  let currentUser = null;
  let stepsCompleted = {};
  let currentStep = 0;

  auth.onAuthStateChanged(user => { 
    if (user) { currentUser = user; syncProgress(); } 
  });

  async function syncProgress() {
    const docRef = db.collection('UserLessonProgress').doc(currentUser.uid).collection('lessons').doc(lessonID);
    const doc = await docRef.get();
    if(!doc.exists) {
      stepsCompleted = {};
      for(let i=0; i<lessonData.length; i++) stepsCompleted[`step_${i}`] = false;
    } else {
      stepsCompleted = doc.data().steps;
    }
    initSidebar();
    updateSidebar();
    showPage(0, true);
  }

  async function saveStepProgress(stepIdx, nextIdx) {
    stepsCompleted[`step_${stepIdx}`] = true;
    const docRef = db.collection('UserLessonProgress').doc(currentUser.uid).collection('lessons').doc(lessonID);
    await docRef.set({ steps: stepsCompleted, lastUpdated: new Date() }, { merge: true });
    updateSidebar();
    if(stepIdx !== nextIdx && nextIdx < lessonData.length) showPage(nextIdx);
  }

  // ---------------------------------------------------------
  // 3. UI RENDERING & VALIDATION
  // ---------------------------------------------------------
  function initSidebar() {
    const navList = document.getElementById('nav-list');
    let currentSection = "";
    let html = "";
    lessonData.forEach((lesson, i) => {
      if(lesson.section !== currentSection) {
         currentSection = lesson.section;
         html += `<div class="nav-section-title">${currentSection}</div>`;
      }
      html += `<div id="nav-item-${i}" class="nav-item" onclick="showPage(${i})">${lesson.title}</div>`;
    });
    navList.innerHTML = html;
  }

  function updateSidebar() {
    let completedCount = 0;
    lessonData.forEach((lesson, i) => {
      const el = document.getElementById(`nav-item-${i}`);
      if(!el) return;
      
      const isDone = stepsCompleted[`step_${i}`];
      const isPrevDone = i === 0 || stepsCompleted[`step_${i-1}`];
      
      if(isDone) completedCount++;
      
      el.className = "nav-item";
      if(i === currentStep) el.classList.add("active");
      else if(isDone) el.classList.add("completed");
      else if(!isPrevDone) el.classList.add("locked");
    });
    
    const maxSteps = lessonData.length - 1; 
    const pct = Math.round((completedCount / maxSteps) * 100);
    document.getElementById('percent-display').textContent = `System Optimization: ${pct > 100 ? 100 : pct}%`;
  }

  function showPage(index, force = false) {
    if (!force && index > 0 && !stepsCompleted[`step_${index-1}`]) return;
    
    currentStep = index;
    const contentBox = document.getElementById('dynamic-content');
    
    contentBox.classList.remove('active');
    contentBox.innerHTML = lessonData[index].html;
    void contentBox.offsetWidth; 
    contentBox.classList.add('active');
    
    // Check if Simulator page loaded
    if (lessonData[index].title.includes("SIMULATOR")) {
       setTimeout(() => {
           updatePercentSim(50);
       }, 50);
    }
    
    updateSidebar();
  }

  // Submission Handlers
  function submitSimple() { saveStepProgress(currentStep, currentStep + 1); }

  function submitMCQ(isCorrect, msg) {
    const fb = document.getElementById('fb-box');
    if(isCorrect) {
       fb.innerHTML = `<span style="color:var(--success);">${msg}</span>`;
       setTimeout(() => saveStepProgress(currentStep, currentStep + 1), 1000);
    } else {
       fb.innerHTML = `<span style="color:var(--error);">${msg}</span>`;
    }
  }

  function submitInput(expectedValue) {
    const val = document.getElementById('ans-input').value.trim();
    const fb = document.getElementById('fb-box');
    if(val !== "" && Number(val) === expectedValue) {
       fb.innerHTML = `<span style="color:var(--success);">✅ Verified! Matrix locked.</span>`;
       setTimeout(() => saveStepProgress(currentStep, currentStep + 1), 1000);
    } else {
       fb.innerHTML = `<span style="color:var(--error);">❌ System Alert: Check calculations.</span>`;
    }
  }

  function submitFinal(exp1, exp2) {
    const q1 = document.getElementById('final-q1').value.trim();
    const q2 = document.getElementById('final-q2').value.trim();
    const fb = document.getElementById('fb-box');
    if(q1 !== "" && q2 !== "" && Number(q1) === exp1 && Number(q2) === exp2) {
       fb.innerHTML = `<span style="color:var(--success);">✅ Terminal checks passed! Core unlocked.</span>`;
       setTimeout(() => saveStepProgress(currentStep, currentStep + 1), 1200);
    } else {
       fb.innerHTML = `<span style="color:var(--error);">❌ Diagnostics failed. Remember, it's always out of 100!</span>`;
    }
  }

  // ---------------------------------------------------------
  // 4. SIMULATOR LOGIC (Custom 100-Block Grid)
  // ---------------------------------------------------------
  function updatePercentSim(val) {
    const display = document.getElementById('sim-val');
    const grid = document.getElementById('percent-grid');
    if(!display || !grid) return;
    
    display.innerText = val + "%";
    grid.innerHTML = "";
    
    // Generate exactly 100 blocks
    for(let i = 0; i < 100; i++) {
        let box = document.createElement('div');
        box.style.width = '25px';
        box.style.height = '25px';
        box.style.borderRadius = '3px';
        // Fill boxes based on the slider value
        box.style.backgroundColor = (i < val) ? 'var(--lab-primary)' : '#ecf0f1';
        grid.appendChild(box);
    }
  }

  function submitSim() {
    // 0.62 = 62%. 100 - 62 = 38 empty blocks.
    const ans = document.getElementById('ans-sim').value.trim();
    const fb = document.getElementById('fb-box');
    
    if(ans !== "" && Number(ans) === 38) {
       fb.innerHTML = `<span style="color:var(--success);">✅ Perfect! 62% is full, leaving 38 empty blocks.</span>`;
       setTimeout(() => saveStepProgress(currentStep, currentStep + 1), 1500);
    } else {
       fb.innerHTML = `<span style="color:var(--error);">❌ Incorrect. Slide the bar to 62. How many blocks out of 100 are grey?</span>`;
    }
  }
</script>
</body>
</html>
