<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>5th Grade Math: Multiply & Divide Decimals Lab</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <style>
    :root { 
      --lab-teal: #00cec9; 
      --lab-dark: #2d3436; 
      --bg: #f5f6fa; 
      --success: #00b894; 
      --error: #d63031;
      --locked: #b2bec3; 
    }
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; color: var(--lab-dark); }
    
    /* Navigation Sidebar */
    nav { width: 340px; background: white; border-right: 1px solid #dfe6e9; display: flex; flex-direction: column; flex-shrink: 0; }
    .nav-header { padding: 25px; background: var(--lab-teal); color: white; }
    .nav-container { flex: 1; overflow-y: auto; }
    .nav-section-title { padding: 12px 20px; font-weight: bold; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; background: #f1f2f6; color: #a4b0be; }
    .nav-item { padding: 12px 20px; cursor: pointer; border-bottom: 1px solid #eee; color: #636e72; font-size: 13px; position: relative; transition: 0.3s; display: flex; align-items: center; justify-content: space-between; }
    .nav-item.active { background: #e0f9f8; color: var(--lab-teal); font-weight: bold; border-left: 5px solid var(--lab-teal); }
    .nav-item.locked { color: var(--locked); cursor: not-allowed; background: #f9f9f9; }
    .nav-item.locked::after { content: '🔒'; font-size: 12px; }
    .nav-item.completed::after { content: '✅'; font-size: 12px; }
    
    /* Main Content Area */
    main { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; align-items: center; }
    .content-card { background: white; width: 100%; max-width: 850px; padding: 40px; border-radius: 15px; border: 1px solid #dfe6e9; opacity: 0; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .content-card.active { display: block; animation: fadeIn 0.4s forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    /* Reusable UI Elements */
    .btn { background: var(--lab-teal); color: white; border: none; padding: 14px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; box-shadow: 0 4px 0 #00b3a6; transition: 0.2s; }
    .btn:hover { transform: translateY(-2px); }
    .btn:disabled { background: var(--locked); box-shadow: none; cursor: not-allowed; transform: none; }
    .btn.ans-btn { background: #dfe6e9; color: var(--lab-dark); margin: 0 10px; box-shadow: 0 4px 0 #b2bec3; }
    .btn.ans-btn:hover { background: #b2bec3; }
    
    .math-box { font-size: 28px; display: flex; align-items: center; justify-content: center; background: #f8f9fa; padding: 25px; border-radius: 10px; border: 2px dashed #b2bec3; margin: 25px 0; }
    .math-input { width: 120px; padding: 10px; text-align: center; border: 2px solid var(--lab-teal); border-radius: 8px; font-size: 24px; font-weight: bold; color: var(--lab-dark); outline: none; }
    .math-input:focus { border-color: var(--success); box-shadow: 0 0 8px rgba(0,206,201,0.3); }
    
    .video-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; border-radius: 12px; overflow: hidden; background: #000; margin-bottom: 20px; }
    .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    
    .feedback-text { font-size: 18px; font-weight: bold; text-align: center; margin-top: 15px; height: 30px; }
  </style>
</head>
<body>

<nav>
  <div class="nav-header">
    <strong style="font-size: 18px;">💠 Decimal Velocity Lab</strong>
    <div id="percent-display" style="font-size: 13px; margin-top:8px; opacity:0.8;">Syncing Arrays...</div>
  </div>
  <div class="nav-container" id="nav-list">
    </div>
</nav>

<main>
  <div id="dynamic-content" class="content-card">
    </div>
</main>

<script>
  // ---------------------------------------------------------
  // 1. DATA CONFIGURATION & LESSON GENERATORS
  // ---------------------------------------------------------
  function makeInfo(title, text, btnText = "Acknowledge Directive") {
    return `<h1>${title}</h1><p style="font-size:18px; line-height:1.6;">${text}</p><br><div style="text-align:center;"><button class="btn" onclick="submitSimple()">${btnText}</button></div>`;
  }

  function makeInput(title, concept, q, ans) {
    return `<h1>${title}</h1><p style="font-size:16px; color:#636e72;">${concept}</p>
            <div class="math-box"><span>${q} = &nbsp;</span>
            <input type="number" step="any" id="ans-input" class="math-input" placeholder="?">
            <button class="btn" style="margin-left:20px;" onclick="submitInput(${ans})">Verify</button></div>
            <div id="fb-box" class="feedback-text"></div>`;
  }

  function makeMCQ(title, concept, q, trueTxt, falseTxt, isTrueFirst) {
    const correctMsg = "Correct! Vector array stabilized.";
    const errorMsg = "Matrix failure. Reassess the structural grid.";
    const btn1 = isTrueFirst 
      ? `<button class="btn ans-btn" onclick="submitMCQ(true, '${correctMsg}')">${trueTxt}</button>` 
      : `<button class="btn ans-btn" onclick="submitMCQ(false, '${errorMsg}')">${trueTxt}</button>`;
    const btn2 = isTrueFirst 
      ? `<button class="btn ans-btn" onclick="submitMCQ(false, '${errorMsg}')">${falseTxt}</button>` 
      : `<button class="btn ans-btn" onclick="submitMCQ(true, '${correctMsg}')">${falseTxt}</button>`;
    return `<h1>${title}</h1><p style="font-size:16px; color:#636e72;">${concept}</p>
            <div class="math-box">${q}</div>
            <div style="text-align:center;">${btn1}${btn2}</div>
            <div id="fb-box" class="feedback-text"></div>`;
  }

  const lessonData = [
    // --- CORE PROTOCOLS (1) ---
    {
      title: "1. 🎬 Lab Briefing", section: "Core Protocols",
      html: `<h1>Lab Briefing: Decimal Velocity</h1>
             <p>Welcome back, Architect! Decimal vectors operate similarly to whole numbers, but require exact coordinate tracking for the decimal point. Scan this engineering transmission.</p>
             <div class="video-container"><iframe src="https://www.youtube.com/embed/Htt09rY9I_A" frameborder="0" allowfullscreen></iframe></div>
             <div style="text-align:center;"><button class="btn" onclick="submitSimple()">System Core Online!</button></div>`
    },
    // --- LEVEL 1: Multiply by Whole (6) ---
    {
      title: "2. 📜 L1-1: The Drop Protocol", section: "Level 1: Multiply by Whole",
      html: makeInfo("The Drop Protocol", "When multiplying a decimal by a whole number, temporarily <strong>ignore the decimal</strong>. Multiply normally. Then, count the decimal places in your original factor and drop that exact number of places into your answer.")
    },
    {
      title: "3. 🔍 L1-2: Vector Count", section: "Level 1: Multiply by Whole",
      html: makeMCQ("Vector Count", "Analyze the target: <strong>1.2 &times; 3</strong>", "How many total decimal places are in the factors?", "1 Place", "2 Places", true)
    },
    {
      title: "4. ⚡ L1-3: Simple Scaler", section: "Level 1: Multiply by Whole",
      html: makeInput("Simple Scaler", "Multiply 25 by 4, then insert 1 decimal place.", "2.5 &times; 4", 10)
    },
    {
      title: "5. ⚡ L1-4: Mid Scaler", section: "Level 1: Multiply by Whole",
      html: makeInput("Mid Scaler", "Multiply 8 by 7, then shift the decimal 1 place.", "0.8 &times; 7", 5.6)
    },
    {
      title: "6. ⚡ L1-5: Heavy Scaler", section: "Level 1: Multiply by Whole",
      html: makeInput("Heavy Scaler", "Process multi-digit grids.", "12.1 &times; 5", 60.5)
    },
    {
      title: "7. ⚡ L1-6: Padding Zeroes", section: "Level 1: Multiply by Whole",
      html: makeInput("Padding Zeroes", "Count carefully! Two decimal places are required in the output.", "0.04 &times; 6", 0.24)
    },
    // --- LEVEL 2: Multiply by Decimals (6) ---
    {
      title: "8. 📜 L2-1: Dual Vector Protocol", section: "Level 2: Multiply by Decimals",
      html: makeInfo("Dual Vector Protocol", "When both factors are decimals, you must count the decimal places in <strong>both</strong> numbers. Add them together. That total is how many decimal places your final product needs.")
    },
    {
      title: "9. 🔍 L2-2: Matrix Sizing", section: "Level 2: Multiply by Decimals",
      html: makeMCQ("Matrix Sizing", "Look closely: <strong>0.3 &times; 0.4</strong>", "What is the total number of decimal places needed?", "1 Place", "2 Places", false)
    },
    {
      title: "10. ⚡ L2-3: Micro Impact", section: "Level 2: Multiply by Decimals",
      html: makeInput("Micro Impact", "Multiply 3 by 4, then apply 2 decimal places.", "0.3 &times; 0.4", 0.12)
    },
    {
      title: "11. ⚡ L2-4: Standard Array", section: "Level 2: Multiply by Decimals",
      html: makeInput("Standard Array", "15 &times; 2 is 30. How many total decimal places?", "1.5 &times; 0.2", 0.3)
    },
    {
      title: "12. ⚡ L2-5: Zero Shift", section: "Level 2: Multiply by Decimals",
      html: makeInput("Zero Shift", "Track the three total decimal shifts required here.", "0.05 &times; 0.8", 0.04)
    },
    {
      title: "13. ⚡ L2-6: Double Expansion", section: "Level 2: Multiply by Decimals",
      html: makeInput("Double Expansion", "Run 21 &times; 13, then insert the decimal.", "2.1 &times; 1.3", 2.73)
    },
    // --- LEVEL 3: Divide by Whole Numbers (6) ---
    {
      title: "14. 📜 L3-1: Upward Alignment", section: "Level 3: Divide by Whole",
      html: makeInfo("Upward Alignment", "When dividing a decimal by a whole number, the decimal point floats <strong>straight up</strong> into the quotient (answer). Once locked in place, divide normally as if the decimal isn't there.")
    },
    {
      title: "15. 🔍 L3-2: Float Trajectory", section: "Level 3: Divide by Whole",
      html: makeMCQ("Float Trajectory", "For the problem <strong>4.8 &divide; 2</strong>, where does the decimal go?", "Straight Up", "Shifted Right", true)
    },
    {
      title: "16. ⚡ L3-3: Base Split", section: "Level 3: Divide by Whole",
      html: makeInput("Base Split", "Divide 48 by 2, floating the decimal straight up.", "4.8 &divide; 2", 2.4)
    },
    {
      title: "17. ⚡ L3-4: Offset Split", section: "Level 3: Divide by Whole",
      html: makeInput("Offset Split", "Process the whole array.", "7.5 &divide; 5", 1.5)
    },
    {
      title: "18. ⚡ L3-5: Micro Split", section: "Level 3: Divide by Whole",
      html: makeInput("Micro Split", "Track small values. Ensure zeroes are placed properly.", "0.36 &divide; 3", 0.12)
    },
    {
      title: "19. ⚡ L3-6: Phantom Extension", section: "Level 3: Divide by Whole",
      html: makeInput("Phantom Extension", "If a remainder exists, add a 0 to the dividend and keep going!", "3.2 &divide; 5", 0.64)
    },
    // --- LEVEL 4: Divide by Decimals (6) ---
    {
      title: "20. 📜 L4-1: The Shift Override", section: "Level 4: Divide by Decimals",
      html: makeInfo("The Shift Override", "Never divide by a decimal! <strong>Shift</strong> the decimal point in the divisor to the right until it is a whole number. You MUST shift the decimal in the dividend the exact same amount.")
    },
    {
      title: "21. 🔍 L4-2: Divisor Conversion", section: "Level 4: Divide by Decimals",
      html: makeMCQ("Divisor Conversion", "If we shift <strong>2.4 &divide; 0.6</strong> to make 0.6 a whole number...", "What does the new equation become?", "24 &divide; 6", "24 &divide; 60", true)
    },
    {
      title: "22. ⚡ L4-3: Base Shift", section: "Level 4: Divide by Decimals",
      html: makeInput("Base Shift", "Calculate the shifted equivalent.", "2.4 &divide; 0.6", 4)
    },
    {
      title: "23. ⚡ L4-4: Equal Shift", section: "Level 4: Divide by Decimals",
      html: makeInput("Equal Shift", "Shift both variables 1 space to the right.", "0.75 &divide; 0.5", 1.5)
    },
    {
      title: "24. ⚡ L4-5: Multi-Shift", section: "Level 4: Divide by Decimals",
      html: makeInput("Multi-Shift", "Shift both variables. This becomes 14.4 &divide; 12.", "1.44 &divide; 1.2", 1.2)
    },
    {
      title: "25. ⚡ L4-6: Whole Target Shift", section: "Level 4: Divide by Decimals",
      html: makeInput("Whole Target Shift", "If shifting a whole number (3), you must add a zero! (30 &divide; 6)", "3 &divide; 0.6", 5)
    },
    // --- LEVEL 5: Master Operations (6) ---
    {
      title: "26. 📜 L5-1: Terminal Calibration", section: "Level 5: Master Operations",
      html: makeInfo("Terminal Calibration", "Warning: Mixed arrays detected. In this final sector, you must switch rapidly between multiplication and division protocols.")
    },
    {
      title: "27. ⚡ L5-2: Mix Ops Alpha", section: "Level 5: Master Operations",
      html: makeInput("Mix Ops Alpha", "Identify the protocol and execute.", "0.9 &times; 0.9", 0.81)
    },
    {
      title: "28. ⚡ L5-3: Mix Ops Beta", section: "Level 5: Master Operations",
      html: makeInput("Mix Ops Beta", "Identify the protocol and execute.", "5.6 &divide; 0.7", 8)
    },
    {
      title: "29. ⚡ L5-4: Mix Ops Gamma", section: "Level 5: Master Operations",
      html: makeInput("Mix Ops Gamma", "Identify the protocol and execute.", "1.25 &times; 4", 5)
    },
    {
      title: "30. 📝 L5-5: Final Diagnostics", section: "Level 5: Master Operations",
      html: `<h1>Final Diagnostics Output</h1>
             <p>Verify both operational parameters to unlock the Mastery Badge.</p>
             <div style="background:#f8f9fa; padding:20px; border-radius:10px; border:2px dashed #b2bec3; margin:20px 0;">
               <p style="margin:0 0 10px 0; font-size:20px;"><strong>1. Multiply: 3.4 &times; 1.2</strong></p>
               <input type="number" step="any" id="final-q1" class="math-input" placeholder="Result">
               
               <p style="margin:20px 0 10px 0; font-size:20px;"><strong>2. Divide: 8.4 &divide; 0.4</strong></p>
               <input type="number" step="any" id="final-q2" class="math-input" placeholder="Result">
             </div>
             <div style="text-align:center;"><button class="btn" onclick="submitFinal(4.08, 21)">Submit Log</button></div>
             <div id="fb-box" class="feedback-text"></div>`
    },
    {
      title: "31. 🏆 Graduation", section: "Level 5: Master Operations",
      html: `<div style="text-align: center; padding-top:40px;">
               <h1 style="font-size: 80px; margin-bottom: 0;">🏆</h1>
               <h1>Vector Architect Verified!</h1>
               <p style="font-size:18px; max-width:500px; margin: 0 auto 30px auto;">Your decimal placement matrices are flawless. Both multiplication and division array engines are performing at peak calibration.</p>
               <button id="mastery-btn" class="btn" onclick="markMastery()">Lock & Save Session Logs</button>
             </div>`
    }
  ];

  // ---------------------------------------------------------
  // 2. FIREBASE & STATE MANAGEMENT
  // ---------------------------------------------------------
  const lessonID = "5th_grade_mult_div_decimals_v1";
  const firebaseConfig = {
    apiKey: "AIzaSyDoXSwni65CuY1_32ZE8B1nwfQO_3VNpTw",
    authDomain: "contract-center-llc-10.firebaseapp.com",
    projectId: "contract-center-llc-10",
    storageBucket: "contract-center-llc-10.firebasestorage.app",
    messagingSenderId: "323221512767",
    appId: "1:323221512767:web:6421260f875997dbf64e8a"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  let currentUser = null;
  let stepsCompleted = {};
  let currentStep = 0;

  auth.onAuthStateChanged(user => { 
    if (user) { currentUser = user; syncProgress(); } 
  });

  async function syncProgress() {
    const docRef = db.collection('UserLessonProgress').doc(currentUser.uid).collection('lessons').doc(lessonID);
    const doc = await docRef.get();
    if(!doc.exists) {
      stepsCompleted = {};
      for(let i=0; i<lessonData.length; i++) stepsCompleted[`step_${i}`] = false;
    } else {
      stepsCompleted = doc.data().steps;
    }
    initSidebar();
    updateSidebar();
    showPage(0, true);
  }

  async function saveStepProgress(stepIdx, nextIdx) {
    stepsCompleted[`step_${stepIdx}`] = true;
    const docRef = db.collection('UserLessonProgress').doc(currentUser.uid).collection('lessons').doc(lessonID);
    await docRef.set({ steps: stepsCompleted, lastUpdated: new Date() }, { merge: true });
    updateSidebar();
    if(stepIdx !== nextIdx && nextIdx < lessonData.length) showPage(nextIdx);
  }

  // ---------------------------------------------------------
  // 3. UI RENDERING & VALIDATION
  // ---------------------------------------------------------
  function initSidebar() {
    const navList = document.getElementById('nav-list');
    let currentSection = "";
    let html = "";
    lessonData.forEach((lesson, i) => {
      if(lesson.section !== currentSection) {
         currentSection = lesson.section;
         html += `<div class="nav-section-title">${currentSection}</div>`;
      }
      html += `<div id="nav-item-${i}" class="nav-item" onclick="showPage(${i})">${lesson.title}</div>`;
    });
    navList.innerHTML = html;
  }

  function updateSidebar() {
    let completedCount = 0;
    lessonData.forEach((lesson, i) => {
      const el = document.getElementById(`nav-item-${i}`);
      if(!el) return;
      
      const isDone = stepsCompleted[`step_${i}`];
      const isPrevDone = i === 0 || stepsCompleted[`step_${i-1}`];
      
      if(isDone) completedCount++;
      
      el.className = "nav-item";
      if(i === currentStep) el.classList.add("active");
      else if(isDone) el.classList.add("completed");
      else if(!isPrevDone) el.classList.add("locked");
    });
    
    const maxSteps = lessonData.length - 1; 
    const pct = Math.round((completedCount / maxSteps) * 100);
    document.getElementById('percent-display').textContent = `System Optimization: ${pct > 100 ? 100 : pct}%`;
  }

  function showPage(index, force = false) {
    if (!force && index > 0 && !stepsCompleted[`step_${index-1}`]) return;
    currentStep = index;
    const contentBox = document.getElementById('dynamic-content');
    
    // Reset animation
    contentBox.classList.remove('active');
    contentBox.innerHTML = lessonData[index].html;
    void contentBox.offsetWidth; // trigger reflow
    contentBox.classList.add('active');
    
    updateSidebar();
  }

  // Submission Handlers
  function submitSimple() {
    saveStepProgress(currentStep, currentStep + 1);
  }

  function submitMCQ(isCorrect, msg) {
    const fb = document.getElementById('fb-box');
    if(isCorrect) {
       fb.innerHTML = `<span style="color:var(--success);">${msg}</span>`;
       setTimeout(() => saveStepProgress(currentStep, currentStep + 1), 1000);
    } else {
       fb.innerHTML = `<span style="color:var(--error);">${msg}</span>`;
    }
  }

  function submitInput(expectedValue) {
    const val = document.getElementById('ans-input').value.trim();
    const fb = document.getElementById('fb-box');
    
    if(val !== "" && Number(val) === expectedValue) {
       fb.innerHTML = `<span style="color:var(--success);">✅ Verified! Vector locked.</span>`;
       setTimeout(() => saveStepProgress(currentStep, currentStep + 1), 1000);
    } else {
       fb.innerHTML = `<span style="color:var(--error);">❌ System Alert: Check calculations.</span>`;
    }
  }

  function submitFinal(exp1, exp2) {
    const q1 = document.getElementById('final-q1').value.trim();
    const q2 = document.getElementById('final-q2').value.trim();
    const fb = document.getElementById('fb-box');
    
    if(q1 !== "" && q2 !== "" && Number(q1) === exp1 && Number(q2) === exp2) {
       fb.innerHTML = `<span style="color:var(--success);">✅ Terminal checks passed! Matrix unlocked.</span>`;
       setTimeout(() => saveStepProgress(currentStep, currentStep + 1), 1200);
    } else {
       fb.innerHTML = `<span style="color:var(--error);">❌ Diagnostics failed. Validate decimal coordinate placements.</span>`;
    }
  }

  function markMastery() {
    saveStepProgress(currentStep, currentStep);
    const btn = document.getElementById('mastery-btn');
    btn.disabled = true;
    btn.innerText = "Logs Saved!";
    btn.style.background = "var(--success)";
    btn.style.boxShadow = "none";
  }
</script>
</body>
</html>
